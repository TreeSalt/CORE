extend-exclude = [
    "reports",
    "reports_old",
    "reports_production",
    "dist",
    "05_DATA_CACHE",
    "data_cache",
    "build",
    "archive_active_strategies_backup"
]
line-length = 120
target-version = "py310"

[lint]
select = ["E", "F", "I", "B", "PL", "SIM", "TID"]
ignore = [
    "E501",    # Line too long (aesthetic choice)
    "PLR2004", # Magic value used in comparison
    "PLR0913", # Too many arguments
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"antigravity_harness/catalog.py" = ["F401"]
"**/tests/*" = ["PLC0415"]
"tests/*" = ["PLC0415"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
