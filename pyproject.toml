[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers -p no:cacheprovider"
testpaths = [
    "tests",
    "antigravity_harness/tests"
]
pythonpath = "."

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "reports",
    "dist",
    "build",
    "05_DATA_CACHE",
    "scripts",
    "tests",
    "antigravity_harness/tests"
]
disable_error_code = [
    "operator",
    "assignment",
    "var-annotated",
    "attr-defined",
    "dict-item",
    "return-value",
    "misc",
    "arg-type"
]

[tool.ruff]
# Ruff config is loaded from ruff.toml automatically if present,
# but we can also place it here if we want to merge.
# For now, respecting existing ruff.toml.
