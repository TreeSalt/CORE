repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            08_IMPLEMENTATION_NOTES/PROPOSAL_.*\.md|
            06_BENCHMARKING/reports/.*\.md|
            08_IMPLEMENTATION_NOTES/ESCALATIONS/.*\.md|
            scripts/archive/.*
          )$
  - repo: local
    hooks:
      - id: update-badges
        name: Update README badges
        entry: python3 scripts/update_badges.py
        language: system
        pass_filenames: false
        always_run: true
